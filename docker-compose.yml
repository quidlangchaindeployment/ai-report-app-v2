services:
  app:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      BEDROCK_S3_INPUT_BUCKET: ${BEDROCK_S3_INPUT_BUCKET}
      BEDROCK_S3_OUTPUT_BUCKET: ${BEDROCK_S3_OUTPUT_BUCKET}
      BEDROCK_ROLE_ARN: ${BEDROCK_ROLE_ARN}
    # volumes:
    #   - ./:/app  # ← 開発時は便利ですが、コンテナ内の site-packages と衝突しないように注意
    command: >
      streamlit run app.py
      --server.port=8501
      --server.address=0.0.0.0
